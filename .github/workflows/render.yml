name: Render Shotlist Video

# Triggered by the app's "Video rendern" button (Vercel dispatches this via
# the GitHub REST API). Runs on a normal GitHub-hosted runner instead of a
# Vercel serverless function because Vercel's Hobby-plan CPU allocation is
# far too weak to decode real 4K/HEVC phone footage in reasonable time.
on:
  workflow_dispatch:
    inputs:
      renderId:
        required: true
        type: string
      driveAccessToken:
        required: true
        type: string
      scenesJson:
        required: true
        type: string
      caption:
        required: false
        type: string
        default: ""

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mask access token in logs
        run: echo "::add-mask::${{ inputs.driveAccessToken }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Render and upload
        env:
          RENDER_ID: ${{ inputs.renderId }}
          DRIVE_ACCESS_TOKEN: ${{ inputs.driveAccessToken }}
          SCENES_JSON: ${{ inputs.scenesJson }}
          CAPTION: ${{ inputs.caption }}
          APP_URL: ${{ secrets.APP_URL }}
          RENDER_CALLBACK_SECRET: ${{ secrets.RENDER_CALLBACK_SECRET }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node scripts/render-clip.mjs

      - name: Report failure if the render step never got to report itself
        if: failure()
        env:
          APP_URL: ${{ secrets.APP_URL }}
          RENDER_CALLBACK_SECRET: ${{ secrets.RENDER_CALLBACK_SECRET }}
        run: |
          curl -sS -X POST "$APP_URL/api/render-callback" \
            -H "Content-Type: application/json" \
            -H "X-Render-Secret: $RENDER_CALLBACK_SECRET" \
            -d "{\"renderId\":\"${{ inputs.renderId }}\",\"status\":\"error\",\"errorMessage\":\"Render-Workflow abgebrochen, bevor ein Ergebnis gemeldet werden konnte (z.B. Setup-Fehler).\"}"
